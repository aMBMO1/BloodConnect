{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
<div class="card shadow">
   <div class="col-md-6">
<h2 class="mb-0">Report an Issue</h2>
<form method="post">
  {% csrf_token %}
  
  <div class="mb-3">
    <label class="form-label fw-bold">Title</label>
                            {{ form.title }}
     </div>
      <div class="mb-3">
         <label class="form-label fw-bold">description</label>
               {{ form.description }}
          </div>
        <div class="mb-3">
        <label class="form-label fw-bold">user_email</label>
             {{ form.user_email }}
        </div>
  
  <button type="submit" class="btn btn-danger w-100">Submit Issue</button>
</form>
<a href="{% url 'core:home' %}"
                   class="btn btn-outline-secondary w-100 mt-2">
                    Cancel
                </a>
</div></div></div>
{% endblock %}
